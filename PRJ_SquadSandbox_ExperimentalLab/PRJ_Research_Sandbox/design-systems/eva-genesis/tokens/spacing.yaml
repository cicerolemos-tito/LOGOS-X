# EVA GENESIS — Spacing Tokens v1.0.0
# Base unit: 4px. Dense tactical layout.

base_unit: 4

scale:
  0.5: "0.125rem"    #  2px — hairline gaps, icon spacing
  1:   "0.25rem"     #  4px — tight internal padding
  1.5: "0.375rem"    #  6px — badge padding
  2:   "0.5rem"      #  8px — standard internal padding
  3:   "0.75rem"     # 12px — form fields, compact cards
  4:   "1rem"        # 16px — standard padding
  5:   "1.25rem"     # 20px — card padding
  6:   "1.5rem"      # 24px — section internal padding
  8:   "2rem"        # 32px — between card groups
  10:  "2.5rem"      # 40px — component separation
  12:  "3rem"        # 48px — section gaps
  16:  "4rem"        # 64px — major section breaks
  20:  "5rem"        # 80px — hero padding
  24:  "6rem"        # 96px — full section breathing room
  32:  "8rem"        # 128px — page-level dramatic spacing

borders:
  radius-sm: "4px"       # Inputs, small elements
  radius-md: "6px"       # Buttons, cards (default)
  radius-lg: "10px"      # Large containers, panels
  radius-xl: "12px"      # Maximum — modals, sheets
  radius-full: "9999px"  # Pills, badges, avatars only

container:
  max-width: "1280px"
  padding-x: "1.5rem"         # Mobile
  padding-x-lg: "2rem"        # Desktop
  narrow: "768px"              # Content reading width
  wide: "1440px"               # Full-bleed sections
