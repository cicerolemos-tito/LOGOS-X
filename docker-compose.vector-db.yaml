services:
  chroma-db:
    image: chromadb/chroma:latest
    container_name: logos-x-vector-db
    volumes:
      - chroma-data:/chroma/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "127.0.0.1:8000:8000" # Exposto apenas localmente por segurança
    networks:
      - logos-x-internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

volumes:
  chroma-data:
    driver: local

networks:
  logos-x-internal:
    driver: bridge
